<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: white;
        }

        .main-container {
            width: 1000px;
            height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: row;
            position: relative;
            z-index: 10;
            overflow: hidden;
            background: #4285F4;
            padding: 30px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
            border-radius: 2px;
            border-radius: 1rem;
            margin: 2rem;
            overflow: hidden;
            cursor: pointer;
        }

        .topUpMessage-container {
            position: absolute;
            top: 0px;
            margin: 2rem;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            margin: 2rem;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 50px;
        }

        input {
            width: 300px;
            height: 70px;
            background: white;
            border: none;
            outline: none;
            font-size: 30px;
        }

        button {
            background-color: white;
            border: hidden;
        }

        .sub-container {
            background: white;
            margin: 2rem;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            font-weight: bold;
            font-size: 30px;
        }

        h1 {
            text-align: center;
        }

        .logout-button-container {
            position: absolute;
            top: 0px;
            right: 0px;
            margin: 2rem;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
        }

        .btn_logOut {
            width: 150px;
            height: 40px;
        }

        .btn_logOut:hover {
            background-color: crimson;
            color: white;
            transition: 0.5s;
        }

        .submit {
            background: #0066A2;
            color: white;
            border-style: outset;
            border-color: #0066A2;
            height: 50px;
            width: 100px;
            font: bold15px arial, sans-serif;
            text-shadow: none;
            margin: 2rem;
            border-radius: 1rem;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="topUpMessage-container">
            Please enter the amount
        </div>

        <div class="sub-container">
            HKD$ <input type="text" id="input_amount">
        </div>

        <button class="submit" id="submit"> Submit </button>

    </div>

    <script>
        var button_submit = document.getElementById("submit")

        var now_url = window.location.href
        const urlRegex = /^(?:\w+:\/\/)?(?:[^\/]+)(?:\/|$)/
        var matchedPart = now_url.match(urlRegex);
        var extractedUrl = matchedPart ? matchedPart[0] : '';

        if (button_submit) {
            button_submit.addEventListener("click", submit)
        }

        async function submit() {
            const uuid = sessionStorage.getItem("uuid")
            const email = sessionStorage.getItem("email")
            const amount = document.getElementById("input_amount").value
            const next_page = extractedUrl + "app/pageSelect"

            const requestOptions = {
                method: 'PUT',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email : email,
                    amount : amount
                })
            }

            try {
                const response = await fetch("https://27bcccf9-09f5-4669-9825-3ccda226c27c-00-2xpspom7via33.janeway.replit.dev/balance/add", requestOptions)
                const data = await response.json()
                const new_balance = data.new_balance
                alert(`Your new balance is ${new_balance}`)
                console.log(data)
                location.replace(next_page)

                if (!response.ok) {
                    throw new Error("Network response was not ok")
                }

            } catch (error) {
                console.error("Rhere was an error!", error)
            }
        }
    </script>
</body>

</html>
