<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <!-- Font Awesome cdn css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: mediumslateblue;
            color: white;
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
        }

        header {
            font-size: 1.5rem;
        }

        #confirm {
            background: mediumslateblue;
            padding: none;
            border: none;
        }

        #re_scan {
            background: mediumslateblue;
            padding: none;
            border: none;
        }

        .order_control {
            position: absolute;
            top: 18%;
            left: 46.2%;
        }

        .button_confirm {
            background: mediumslateblue;
            color: white;
        }

        .button_confirm:hover {
            color: greenyellow;
            transition: color 1s;

        }

        .button_re_scan {
            color: white;
            background-color: mediumslateblue;
        }

        .button_re_scan:hover {
            color: red;
            transition: color 1s;

        }

        header,
        form {
            min-height: 20vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        form input,
        form button {
            padding: 0.5rem;
            padding-left: 1rem;
            font-size: 1.8rem;
            border: none;
            background: white;
            border-radius: 2rem;
        }

        form button {
            color: rgb(255, 200, 0);
            background: white;
            cursor: pointer;
            transition: all 0.3 ease;
            margin-left: 0.5rem;
        }

        form button:hover {
            color: white;
            background: rgb(255, 200, 0);
        }

        .fa-plus-circle {
            margin-top: 0.3rem;
            margin-left: -8px;
        }

        .emp-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .emp-list {
            min-width: 30%;
            list-style: none;
        }

        .emp {
            margin: 0.5rem;
            padding-left: 0.5rem;
            background: white;
            color: black;
            font-size: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.5s;
            border-radius: 2rem;
        }

        .emp li {
            flex: 1;
        }

        .give_access,
        .complete-btn {
            color: white;
            border: none;
            padding: 1rem;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .complete-btn {
            background: rgb(255, 200, 0);
        }

        .give_access {
            border-top-right-radius: 1.75rem;
            border-bottom-right-radius: 1.75rem;
            background: royalblue;
        }

        .give_access:hover {
            background: aquamarine;
            transition: all 1s;
        }

        .emp-item {
            padding: 0rem 0.5rem;
        }

        .fa-paper-plane,
        .fa-check-circle {
            pointer-events: none;
        }

        .completed {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .slide {
            transform: translateX(10rem);
            opacity: 0;
        }

        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            outline: none;
            border: none;
        }

        .select {
            margin: 1rem;
            position: relative;
            overflow: hidden;
            border-radius: 50px;
        }

        select {
            color: rgb(255, 200, 0);
            width: 10rem;
            height: 3.2rem;
            cursor: pointer;
            padding: 1rem;
        }

        .select::after {
            content: "\25BC";
            position: absolute;
            background: rgb(255, 200, 0);
            top: 0;
            right: 0;
            padding: 1rem;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .select::hover::after {
            background: white;
            color: rgb(255, 200, 0);
        }
    </style>
    <title>Locker Control Panel</title>
</head>

<body>

    <header>
        <h1 id="display_cus_num">Customer ID:</h1>
    </header>

    <div class="order_control">
        <button name="re_scan" id="re_scan"><i
                class="fa-solid fa-rotate-right fa-5x button_re_scan"></i></button>&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp
        <button name="confirm" id="confirm"><i class="fa-solid fa-check fa-5x button_confirm"></i></button>
    </div>

    <form id="total_price_show" action="">
        <input type="text" id="total_price" class="total_price" value="Total Price:$0" disabled>
    </form>

    <div class="emp-container">
        <ul class="emp-list" id="emp_list"></ul>
    </div>

    <script>
        var button_re_scan = document.getElementById("re_scan");
        var button_confirm = document.getElementById("confirm");
        var now_url = window.location.href
        const urlRegex = /^(?:\w+:\/\/)?(?:[^\/]+)(?:\/|$)/
        var matchedPart = now_url.match(urlRegex);
        var extractedUrl = matchedPart ? matchedPart[0] : '';

        if (window.location.href === extractedUrl) {
            // access_success();
            console.log(200)
        }

        if (window.location.href === extractedUrl + "page-shopping") {
            access_success();
        }

        if (button_confirm) {
            button_confirm.addEventListener("click", confirm_order)
        }

        async function access_success() {
            const data_set = JSON.parse('{{ value|tojson|safe }}');
            const name_price = {}
            var htmlString = ""
            var total_price = 0
            const requestOptions = {
                method: "GET"
            }
            try {
                const response = await fetch("https://27bcccf9-09f5-4669-9825-3ccda226c27c-00-2xpspom7via33.janeway.replit.dev/product/list", requestOptions)
                if (!response.ok) {
                    throw new Error("Network response was not ok")
                }

                const data = await response.json()

                for (let i = 0; i < data.length; i++) {
                    name_price[data[i]["name"].toLowerCase()] = data[i]["price"]
                }

                for (let i = 0; i < Object.keys(data_set["shopping_list"]).length; i++) {
                    item = Object.keys(data_set["shopping_list"])[i]
                    price = Number(name_price[item])
                    quantity = Number(data_set["shopping_list"][item])
                    total_price = total_price + price * quantity
                    htmlString += `<div class="emp"><li class="emp-item" id="${item}">${item}(${quantity})&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp$${price * quantity}</li></div>`
                }
                document.getElementById("emp_list").innerHTML = htmlString
                document.getElementById("display_cus_num").innerText = `Customer ID: ${data_set["uuid"]}`
                document.getElementById("total_price").defaultValue = `Total Price:$${total_price}`
                console.log(data_set)
                console.log(name_price)
            } catch (error) {
                console.error("There was an error!", error)
            }
        }

        async function confirm_order() {
            const data_set = JSON.parse('{{ value|tojson|safe }}');
            const requestOptions = {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    uuid: data_set["uuid"],
                    exit: data_set["exit"],
                    shopping_list: data_set["shopping_list"]
                })
            }
            try {
                const response = await fetch("https://27bcccf9-09f5-4669-9825-3ccda226c27c-00-2xpspom7via33.janeway.replit.dev/bill/add", requestOptions)
                console.log(data_set)
                console.log(response)

                if (!response.ok) {
                    throw new Error("Network response was not ok")
                }
            } catch (error) {
                console.error("Rhere was an error!", error)
            }

            const requestOptions2 = {
                method: "GET"
            }
            try {
                const request_url = extractedUrl + "confirm_order"
                console.log(request_url)
                const response = await fetch(request_url, requestOptions2)
                if (!response.ok) {
                    throw new Error("Network response was not ok")
                }

                const data = await response.json()
                console.log(data)

            } catch (error) {
                console.error("There was an error!", error)
            }

            window.location.href = extractedUrl
        }
    </script>

</body>

</html>
