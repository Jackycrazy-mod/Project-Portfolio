<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="./css_file/logIn.css">
</head>
<body>
    <div class="main-container">
        <input type="checkbox" id="slide">
        
        <div class="container">
          <div class="login-container">
     
              <div class="text">
                 Guest Login 
              </div>
        
              <form action="#">
                 <div class="data">
                    <label for="">Locker ID</label>
                    <input type="text" id="locker_id" required>
                 </div>
                 <div class="data">
                    <label for="">One-time Password</label>
                    <input type="password" id="otp_password" required>
                 </div>
        
                 <div class="btn-login">
                    <button type="submit"  id="guest_submit">login</button>
                 </div>
                
                 <div class="login&signup-page-link">
                    Back to the login page? <a href="login_signUp.html">Click here</label></a>
                 </div>
              </form>
           </div>
        </div>
    </div>
    
    <script src="./js_file/index.js"></script>
</body>
</html>
