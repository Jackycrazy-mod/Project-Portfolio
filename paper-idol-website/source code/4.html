<!DOCTYPE html>

<!--Set the html file language.-->
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!--The <meta> tag defines metadata about an HTML document. Metadata is data (information) about data.-->
    <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
    <title>Paper idol fans club contact</title>

    <!-- font awsome cdn link which it provides images and css tools -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">

    <!-- custom css file link -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- header section starts -->

    <header>

        <div class="user">
            <img src="image/avatar.jpg" alt="">
            <h3 class="name">Paper idol</h3>
            <p class="post">multi-instrumentalist</p>
        </div>

        <nav class="navbar">
            <ul>
                <li><a href="1.html">home</a></li>
                <li><a href="2.html">about</a></li>
                <li><a href="3.html">songs</a></li>
                <li><a href="4.html">contact</a></li>
            </ul>
        </nav>
        
    </header>

    <!-- header section ends-->

    <div id="menu" class="fas fa-bars"></div>

    <!-- contact section starts-->

    <section class="contact" id="contact">

        <h1 class="heading"> my <span>contact</span></h1>

        <div class="row">

            <div class="content">

                <h3 class="title">contact info</h3>

                <div class="info">
                    <h3><i class="fas fa-envelope"></i> paperidolmusic@gmail.com </h3>
                    <h3><i class="fas fa-envelope"></i> sidel@gourmetmusicltd.com </h3>
                    <h3><i class="fas fa-envelope"></i> booking: phil@partisanarts.com </h3>
                </div>

            </div>

            <form action="">

                <input type="text" placeholder="name" class="box">
                <input type="email" placeholder="email" class="box">
                <input type="text" placeholder="project" class="box">
                <textarea name="" id="" cols="30" rows="10" class="box message" placeholder="message"></textarea>
                <button type="submit" class="btn"> send <i class="fas fa-paper-plane"></i></button>

            </form>

        </div>

    </section>

    <!-- contact section ends-->

    <!-- customm js file link -->
    <script src="js/script.js"></script>

</body>

</html>
